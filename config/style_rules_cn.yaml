style_rules_cn:
  voice:
    - simple
    - direct
    - vivid
    - emotionally clear
  do:
    - use action and dialogue to reveal character
    - keep the scene moving
    - let cultural meaning appear through behavior
    - use short paragraphs when tension rises
  avoid:
    - long abstract explanation
    - lecture tone
    - dense classical wording
    - too many names in one paragraph without grounding
